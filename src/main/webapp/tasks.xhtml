<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:pt="jakarta.faces.passthrough"
      xmlns:jsf="jakarta.faces"
      lang="en">
<f:view contentType="text/html" encoding="UTF-8">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskFlow — Enterprise task management" />
    <title>TaskFlow</title>

    <!-- Design system, identical to the React app -->
    <h:outputStylesheet name="css/taskflow.css" />
    <!-- PrimeFaces widget overrides so the chrome blends in -->
    <h:outputStylesheet name="css/primefaces-overrides.css" />

    <!-- Small client helpers (debounce, status-menu toggle, ESC-to-close) -->
    <h:outputScript name="js/taskflow.js" />
</h:head>

<h:body styleClass="app">

    <!-- ═══════════════════════════════════════════════════════════════════════
         Toast / growl  — replaces  <Toaster position="top-right" />
         ═══════════════════════════════════════════════════════════════════════ -->
    <p:growl id="growl" showDetail="false" life="3500" globalOnly="true" />

    <!-- ═══════════════════════════════════════════════════════════════════════
         Header  — replaces  <Header />
         ═══════════════════════════════════════════════════════════════════════ -->
    <header class="header">
        <div class="header__inner">
            <div class="header__brand">
                <span class="header__logo" aria-hidden="true">✦</span>
                <span class="header__wordmark">TaskFlow</span>
            </div>
            <nav class="header__nav" aria-label="Main navigation">
                <span class="header__nav-item header__nav-item--active">Tasks</span>
            </nav>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════════════════════════════════
         Main  — replaces  <main className="main"> ... <TaskList /> ... </main>
         ═══════════════════════════════════════════════════════════════════════ -->
    <main class="main" id="main-content">
        <div class="container">

            <!-- Page header -->
            <div class="page-header">
                <h1 class="page-title">My Tasks</h1>
                <p class="page-subtitle">Manage your work, stay on track.</p>
            </div>

            <!-- Everything below lives inside one form so partial AJAX updates
                 ("update=":form:taskList"") can refresh exactly the bits the
                 React render cycle would have touched. -->
            <h:form id="form" prependId="false">

                <!-- ─── Page loader (mirrors PageLoader during initial fetch) ─── -->
                <h:panelGroup rendered="#{taskListBean.loading and taskListBean.page == null}">
                    <div class="page-loader">
                        <div class="spinner-wrapper spinner-wrapper--lg" role="status" aria-label="Loading tasks…">
                            <div class="spinner"></div>
                            <span class="spinner__label">Loading tasks…</span>
                        </div>
                    </div>
                </h:panelGroup>

                <!-- ─── Error state (mirrors `if (isError)`) ─── -->
                <h:panelGroup rendered="#{taskListBean.hasError and taskListBean.page == null}">
                    <div class="error-state" role="alert">
                        <p>Failed to load tasks: <h:outputText value="#{taskListBean.loadError}" /></p>
                        <h:commandLink styleClass="btn btn--primary"
                                       action="#{taskListBean.loadTasks}">
                            <h:outputText value="Retry" />
                            <f:ajax execute="@form" render=":form" />
                        </h:commandLink>
                    </div>
                </h:panelGroup>

                <!-- ─── Main task list panel (only when we have data) ─── -->
                <h:panelGroup id="taskList" layout="block" styleClass="task-list"
                              rendered="#{taskListBean.page != null}">

                    <!-- ───────────────────────────────────────────────────────
                         Toolbar = filters row + "New Task" button.
                         Mirrors  <div className="task-list__toolbar">…</div>
                         ─────────────────────────────────────────────────────── -->
                    <div class="task-list__toolbar">

                        <!-- ░░ Filters ░░ -->
                        <div class="filters">
                            <div class="filters__row">

                                <!-- Search input — debounced 350ms, like the React effect -->
                                <div class="filters__search">
                                    <span class="filters__search-icon" aria-hidden="true">
                                        <!-- inline SearchIcon SVG, identical to the React component -->
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                             stroke="currentColor" stroke-width="2"
                                             stroke-linecap="round" stroke-linejoin="round">
                                            <circle cx="11" cy="11" r="8" />
                                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                        </svg>
                                    </span>
                                    <h:inputText id="search"
                                                 value="#{taskListBean.params.title}"
                                                 styleClass="form-input filters__search-input"
                                                 placeholder="Search tasks…"
                                                 autocomplete="off"
                                                 pt:type="search"
                                                 pt:aria-label="Search tasks by title"
                                                 onkeyup="taskflowDebounce('search', function(){ doSearch(); }, 350)" />
                                    <p:remoteCommand name="doSearch"
                                                     action="#{taskListBean.onSearchChanged}"
                                                     process="@(.filters__search-input)"
                                                     update=":form:taskList" />
                                </div>

                                <!-- Status filter -->
                                <h:selectOneMenu id="statusFilter"
                                                 value="#{taskListBean.params.status}"
                                                 styleClass="form-input form-select filters__status"
                                                 pt:aria-label="Filter by status"
>
                                    <f:selectItem itemValue="#{null}" itemLabel="All statuses" noSelectionOption="true" />
                                    <f:selectItems value="#{viewHelper.statuses}"
                                                   var="s" itemValue="#{s}" itemLabel="#{s.label}" />
                                    <f:ajax execute="@this" render=":form:taskList"
                                            listener="#{taskListBean.onStatusChanged}" />
                                </h:selectOneMenu>

                                <!-- Sort direction -->
                                <h:selectOneMenu id="sortFilter"
                                                 value="#{taskListBean.params.direction}"
                                                 styleClass="form-input form-select filters__sort"
                                                 pt:aria-label="Sort direction"
>
                                    <f:selectItem itemValue="DESC" itemLabel="Newest first" />
                                    <f:selectItem itemValue="ASC"  itemLabel="Oldest first" />
                                    <f:ajax execute="@this" render=":form:taskList"
                                            listener="#{taskListBean.onDirectionChanged}" />
                                </h:selectOneMenu>

                                <!-- Clear filters (only shown when any are active) -->
                                <h:commandButton value="Clear filters"
                                                 styleClass="btn btn--ghost filters__clear"
                                                 rendered="#{taskListBean.hasFilters}"
                                                 action="#{taskListBean.clearFilters}">
                                    <f:ajax execute="@this" render=":form:taskList" />
                                </h:commandButton>
                            </div>

                            <!-- Filter meta row -->
                            <div class="filters__meta">
                                <span class="filters__count">
                                    <h:outputText value="#{taskListBean.totalElements} " />
                                    <h:outputText value="#{taskListBean.totalElements == 1 ? 'task' : 'tasks'}" />
                                    <h:outputText value="#{taskListBean.hasFilters ? ' found' : ' total'}" />
                                </span>
                            </div>
                        </div>

                        <!-- ░░ "+ New Task" button ░░ -->
                        <h:commandLink id="btnCreate"
                                       styleClass="btn btn--primary task-list__create-btn"
                                       action="#{taskListBean.openCreate}">
                            <h:outputText value="+ New Task" />
                            <f:ajax execute="@this" render=":form:taskModalGroup" />
                        </h:commandLink>
                    </div>

                    <!-- ───────────────────────────────────────────────────────
                         Empty state OR grid.  Mirrors:
                         {paged.content.length === 0 ? <EmptyState …/> : <div className="task-grid">…</div>}
                         ─────────────────────────────────────────────────────── -->

                    <!-- Empty state -->
                    <h:panelGroup rendered="#{taskListBean.noTasks}">
                        <div class="empty-state">
                            <div class="empty-state__icon" aria-hidden="true">
                                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                                    <rect x="8" y="16" width="48" height="36" rx="4"
                                          stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
                                    <path d="M22 28h20M22 36h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    <circle cx="48" cy="48" r="10" fill="var(--surface-2)" stroke="currentColor" stroke-width="2"/>
                                    <path d="M44 48h8M48 44v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <h3 class="empty-state__title">No tasks found</h3>
                            <p class="empty-state__description">
                                <h:outputText rendered="#{taskListBean.hasFilters}"
                                              value="Try adjusting your filters." />
                                <h:outputText rendered="#{not taskListBean.hasFilters}"
                                              value="Create your first task to get started." />
                            </p>
                            <h:panelGroup rendered="#{not taskListBean.hasFilters}" styleClass="empty-state__action">
                                <h:commandLink styleClass="btn btn--primary"
                                               action="#{taskListBean.openCreate}">
                                    <h:outputText value="Create task" />
                                    <f:ajax execute="@this" render=":form:taskModalGroup" />
                                </h:commandLink>
                            </h:panelGroup>
                        </div>
                    </h:panelGroup>

                    <!-- ─── Grid of task cards ─── -->
                    <h:panelGroup rendered="#{not taskListBean.noTasks}">
                        <div class="task-grid" role="list">
                            <ui:repeat value="#{taskListBean.tasks}" var="task" varStatus="vs">
                                <div role="listitem">
                                    <ui:include src="/WEB-INF/includes/taskCard.xhtml">
                                        <ui:param name="task" value="#{task}" />
                                        <ui:param name="cardIndex" value="#{vs.index}" />
                                    </ui:include>
                                </div>
                            </ui:repeat>
                        </div>
                    </h:panelGroup>

                    <!-- ───────────────────────────────────────────────────────
                         Pagination — mirrors  <Pagination />
                         ─────────────────────────────────────────────────────── -->
                    <h:panelGroup rendered="#{taskListBean.totalPages gt 1}">
                        <nav class="pagination" aria-label="Pagination">
                            <h:commandLink styleClass="pagination__btn"
                                           action="#{taskListBean.prevPage}"
                                           pt:aria-label="Previous page"
                                           disabled="#{taskListBean.currentPage == 0}">
                                <h:outputText value="←" />
                                <f:ajax execute="@this" render=":form:taskList" />
                            </h:commandLink>

                            <ui:repeat value="#{taskListBean.visiblePages}" var="p">
                                <span class="pagination__item">
                                    <h:outputText value="…" styleClass="pagination__ellipsis"
                                                  rendered="#{p == -1}" />
                                    <h:commandLink rendered="#{p ge 0}"
                                                   styleClass="pagination__btn #{p == taskListBean.currentPage ? 'pagination__btn--active' : ''}"
                                                   action="#{taskListBean.goToPage(p)}"
                                                   pt:aria-current="#{p == taskListBean.currentPage ? 'page' : ''}">
                                        <h:outputText value="#{p + 1}" />
                                        <f:ajax execute="@this" render=":form:taskList" />
                                    </h:commandLink>
                                </span>
                            </ui:repeat>

                            <h:commandLink styleClass="pagination__btn"
                                           action="#{taskListBean.nextPage}"
                                           pt:aria-label="Next page"
                                           disabled="#{taskListBean.currentPage == taskListBean.totalPages - 1}">
                                <h:outputText value="→" />
                                <f:ajax execute="@this" render=":form:taskList" />
                            </h:commandLink>
                        </nav>
                    </h:panelGroup>
                </h:panelGroup>


                <!-- ═══════════════════════════════════════════════════════════
                     Create / Edit modal — mirrors <TaskModal />
                     ═══════════════════════════════════════════════════════════ -->
                <h:panelGroup id="taskModalGroup" layout="block">
                    <ui:include src="/WEB-INF/includes/taskModal.xhtml" />
                </h:panelGroup>

                <!-- ═══════════════════════════════════════════════════════════
                     Delete confirmation — mirrors <ConfirmDialog />
                     ═══════════════════════════════════════════════════════════ -->
                <h:panelGroup id="confirmDialogGroup" layout="block">
                    <ui:include src="/WEB-INF/includes/confirmDialog.xhtml" />
                </h:panelGroup>

            </h:form>
        </div>
    </main>

</h:body>
</f:view>
</html>
