<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:pt="jakarta.faces.passthrough">

    <!--
        TaskCard — mirrors src/components/task/TaskCard.tsx exactly.

        Receives:
          #{task}      — the current Task being rendered
          #{cardIndex} — repeat index (kept for future use, not rendered)
    -->

    <article class="task-card #{task.status.name() == 'DONE' ? 'task-card--done' : ''}">

        <!-- ─── Header: status badge + edit/delete actions ──────────────── -->
        <div class="task-card__header">

            <!-- Status badge (replaces <StatusBadge />) -->
            <span class="badge #{task.status.badgeClass} badge--md">
                <h:outputText value="#{task.status.label}" />
            </span>

            <div class="task-card__menu-wrapper">
                <div class="task-card__actions">

                    <!-- Edit button (PencilIcon SVG inlined) -->
                    <h:commandLink styleClass="btn-icon"
                                   action="#{taskListBean.openEdit(task)}"
                                   pt:aria-label="Edit task: #{task.title}"
                                   pt:title="Edit">
                        <f:passThroughAttribute name="role" value="button" />
                        <f:ajax execute="@this" render=":form:taskModalGroup" />
                        <h:outputText escape="false" value="
                            &lt;svg width='14' height='14' viewBox='0 0 24 24' fill='none'
                                  stroke='currentColor' stroke-width='2' stroke-linecap='round'
                                  stroke-linejoin='round' aria-hidden='true'&gt;
                              &lt;path d='M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7'/&gt;
                              &lt;path d='M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'/&gt;
                            &lt;/svg&gt;" />
                    </h:commandLink>

                    <!-- Delete button (TrashIcon SVG inlined) -->
                    <h:commandLink styleClass="btn-icon btn-icon--danger"
                                   action="#{taskListBean.promptDelete(task)}"
                                   pt:aria-label="Delete task: #{task.title}"
                                   pt:title="Delete">
                        <f:passThroughAttribute name="role" value="button" />
                        <f:ajax execute="@this" render=":form:confirmDialogGroup" />
                        <h:outputText escape="false" value="
                            &lt;svg width='14' height='14' viewBox='0 0 24 24' fill='none'
                                  stroke='currentColor' stroke-width='2' stroke-linecap='round'
                                  stroke-linejoin='round' aria-hidden='true'&gt;
                              &lt;polyline points='3 6 5 6 21 6'/&gt;
                              &lt;path d='M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6'/&gt;
                              &lt;path d='M10 11v6M14 11v6'/&gt;
                              &lt;path d='M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2'/&gt;
                            &lt;/svg&gt;" />
                    </h:commandLink>
                </div>
            </div>
        </div>

        <!-- ─── Body ────────────────────────────────────────────────────── -->
        <div class="task-card__body">
            <h3 class="task-card__title #{task.status.name() == 'DONE' ? 'task-card__title--done' : ''}">
                <h:outputText value="#{task.title}" />
            </h3>
            <h:panelGroup rendered="#{not empty task.description}">
                <p class="task-card__description">
                    <h:outputText value="#{task.description}" />
                </p>
            </h:panelGroup>
        </div>

        <!-- ─── Footer: due-date pill + status change menu ──────────────── -->
        <div class="task-card__footer">
            <h:panelGroup rendered="#{task.dueDate != null}">
                <span class="#{viewHelper.dueClass(task)}" title="#{viewHelper.formatDate(task.dueDate)}">
                    <h:outputText escape="false" value="
                        &lt;svg width='12' height='12' viewBox='0 0 24 24' fill='none'
                              stroke='currentColor' stroke-width='2' stroke-linecap='round'
                              stroke-linejoin='round' aria-hidden='true'&gt;
                          &lt;circle cx='12' cy='12' r='10'/&gt;
                          &lt;polyline points='12 6 12 12 16 14'/&gt;
                        &lt;/svg&gt;" />
                    <h:outputText value=" #{viewHelper.isOverdue(task) ? 'Overdue · ' : 'Due · '}" />
                    <h:outputText value="#{viewHelper.formatDate(task.dueDate)}" />
                </span>
            </h:panelGroup>
            <h:panelGroup rendered="#{task.dueDate == null}">
                <span class="task-card__due task-card__due--none">No due date</span>
            </h:panelGroup>

            <!-- "Move to ↓" status menu -->
            <div class="task-card__status-change">
                <button type="button" class="btn-text btn-text--sm"
                        onclick="taskflowToggleStatusMenu('statusMenu_#{task.id}'); return false;"
                        aria-haspopup="listbox">
                    Move to ↓
                </button>
                <ul id="statusMenu_#{task.id}" class="status-menu" role="listbox"
                    aria-label="Change status">
                    <ui:repeat value="#{viewHelper.statuses}" var="s">
                        <h:panelGroup rendered="#{s != task.status}">
                            <li>
                                <h:commandLink styleClass="status-menu__item"
                                               action="#{taskListBean.changeStatus(task, s.name())}">
                                    <f:passThroughAttribute name="role" value="option" />
                                    <h:outputText value="#{s.label}" />
                                    <f:ajax execute="@this" render=":form:taskList :form:growl" />
                                </h:commandLink>
                            </li>
                        </h:panelGroup>
                    </ui:repeat>
                </ul>
            </div>
        </div>

        <!-- ─── Meta line ───────────────────────────────────────────────── -->
        <div class="task-card__meta">
            <span title="Updated #{viewHelper.formatDate(task.updatedAt)}">
                Updated <h:outputText value="#{viewHelper.formatRelative(task.updatedAt)}" />
            </span>
        </div>
    </article>

</ui:composition>
